<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }} | BrillIAnt</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dark-theme">
    <div class="container">
        <!-- Top Bar -->
        <div class="top-bar">
            <a href="index.html" class="back-link">← Voltar para o Radar</a>
            <div class="logo-small">brill<span class="highlight">IA</span>nt</div>
        </div>

        <!-- Hero -->
        <header class="article-header">
            <div class="badge">{{ ferramenta }} · {{ empresa }}</div>
            <h1 class="article-title">{{ titulo }}</h1>
            <p class="article-date">📅 Semana de {{ data_semana }}</p>
        </header>

        <!-- Article Content -->
        <main class="article-content">
            <article class="prose">
                {{ conteudo_completo }}
            </article>

            <!-- Navigation -->
            <div class="article-nav">
                <a href="{{ materia_anterior }}" class="nav-link prev">← Matéria anterior</a>
                <a href="{{ proxima_materia }}" class="nav-link next">Próxima matéria →</a>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <h4 class="footer-logo">brill<span class="highlight">IA</span>nt</h4>
                <p class="footer-tagline">BrillIAnt: O seu primeiro passo no mundo da IA.</p>
                <p class="footer-cta">Coloque a IA para trabalhar por você.</p>
            </div>
        </footer>
    </div>
</body>
</html>
